<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Webpage </title>
    <link rel="stylesheet" href="toDo.css">
</head>

<body>
    <div class="user">
        <div class="todo">
            <h1>Welcome ToDo App</h1>

            <input type="text" id="todo" placeholder="Enter Your Tasks here...">

            <button id="submit">Add Tasks</button>
        </div>
    </div>

    <div id="output" class="outDisp">
        <h2>Your Todos </h2>
        <ul id="todoList"></ul>
    </div>

    <script src="toDo.js"></script>
</body>

</html>
